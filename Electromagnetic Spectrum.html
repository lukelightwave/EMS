const BAR_GRADIENT = `linear-gradient(to right,
  #b566ff 0%,
  #6db8f8 14.28%,
  #9c55f5 28.57%,
  #7c3aed 42.85%, #3b82f6 45.2%, #10b981 47.8%, #eab308 50.5%, #ef4444 57.14%,
  #dc2626 57.15%, #b34510 71.43%,
  #ea5a0c 71.44%, #5a55e8 85.71%,
  #1a1850 100%)`;

/* =========================================================
   HELPERS
   ========================================================= */
function hexToRgb(hex) {
  return [
    parseInt(hex.slice(1,3), 16),
    parseInt(hex.slice(3,5), 16),
    parseInt(hex.slice(5,7), 16),
  ];
}

/* =========================================================
   WAVE CANVAS
   ========================================================= */
function WaveCanvas({ region }) {
  const canvasRef = useRef(null);
  const rafRef = useRef(null);
  const phaseRef = useRef(0);
  const regionRef = useRef(region);

  useEffect(() => {
    regionRef.current = region;
    phaseRef.current = 0;
  }, [region.id]);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;

    const render = () => {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const W = canvas.clientWidth;
      const H = canvas.clientHeight;
      if (!W || !H) { rafRef.current = requestAnimationFrame(render); return; }
      if (canvas.width !== W * dpr || canvas.height !== H * dpr) {
        canvas.width = W * dpr;
        canvas.height = H * dpr;
      }
      const ctx = canvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, W, H);

      // axis
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(255,255,255,0.045)';
      ctx.lineWidth = 1;
      ctx.moveTo(16, H / 2);
      ctx.lineTo(W - 16, H / 2);
      ctx.stroke();

      const { cycles, color, rainbow } = regionRef.current;
      const amplitude = H * 0.36;
      const speed = 0.028 * Math.max(0.45, cycles / 5);
      const phase = phaseRef.current;
      const px = 16;
      const pw = W - 32;

      if (rainbow) {
        const steps = Math.floor(pw);
        for (let i = 0; i < steps - 1; i += 2) {
          const t1 = i / steps;
          const t2 = (i + 2) / steps;
          const x1 = px + t1 * pw;
          const x2 = px + t2 * pw;
          const y1 = H / 2 + Math.sin(t1 * Math.PI * 2 * cycles - phase) * amplitude;
          const y2 = H / 2 + Math.sin(t2 * Math.PI * 2 * cycles - phase) * amplitude;
          const hue = (1 - t1) * 255 + 5;

          ctx.beginPath();
          ctx.strokeStyle = `hsla(${hue},100%,60%,0.12)`;
          ctx.lineWidth = 9;
          ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
          ctx.stroke();

          ctx.beginPath();
          ctx.strokeStyle = `hsla(${hue},100%,68%,0.9)`;
          ctx.lineWidth = 2;
          ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
          ctx.stroke();
        }
      } else {
        const [r, g, b] = hexToRgb(color);
        const buildPath = () => {
          ctx.beginPath();
          const steps = 400;
          for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            const x = px + t * pw;
            const y = H / 2 + Math.sin(t * Math.PI * 2 * cycles - phase) * amplitude;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          }
        };
        [[14, 0.07], [7, 0.18], [2, 0.88]].forEach(([lw, alpha]) => {
          buildPath();
          ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
          ctx.lineWidth = lw;
          ctx.lineJoin = 'round';
          ctx.stroke();
        });
      }

      phaseRef.current += speed;
      rafRef.current = requestAnimationFrame(render);
    };

    rafRef.current = requestAnimationFrame(render);
    return () => cancelAnimationFrame(rafRef.current);
  }, []);

  return (
    <canvas
      ref={canvasRef}
      style={{ width: '100%', height: '154px', display: 'block', borderRadius: 8 }}
    />
  );
}

/* =========================================================
   SPECTRUM BAR
   ========================================================= */
function SpectrumBar({ selectedIndex, onChange }) {
  const barRef = useRef(null);
  const dragging = useRef(false);

  const computeIdx = useCallback((clientX) => {
    if (!barRef.current) return 0;
    const rect = barRef.current.getBoundingClientRect();
    const x = Math.max(0, Math.min(clientX - rect.left, rect.width));
    return Math.min(6, Math.floor((x / rect.width) * 7));
  }, []);

  useEffect(() => {
    const onMove = (e) => {
      if (!dragging.current) return;
      e.preventDefault();
      onChange(computeIdx(e.touches ? e.touches[0].clientX : e.clientX));
    };
    const onUp = () => { dragging.current = false; };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onUp);
    return () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onUp);
    };
  }, [computeIdx, onChange]);

  const region = SPECTRUM[selectedIndex];
  const handlePct = ((selectedIndex + 0.5) / 7) * 100;

  return (
    <div style={{ paddingBottom: 40 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 12 }}>
        <span className="bar-label" style={{ fontSize: 10, color: '#2e3a4e', letterSpacing: '0.08em', textTransform: 'uppercase' }}>
          ← Higher Energy · Higher Frequency · Shorter Wavelength
        </span>
        <span className="bar-label" style={{ fontSize: 10, color: '#2e3a4e', letterSpacing: '0.08em', textTransform: 'uppercase' }}>
          Lower Energy · Lower Frequency · Longer Wavelength →
        </span>
      </div>

      <div
        ref={barRef}
        style={{
          position: 'relative',
          height: 54,
          borderRadius: 11,
          cursor: 'pointer',
          background: BAR_GRADIENT,
          boxShadow: `0 0 60px ${region.glow}, 0 4px 24px rgba(0,0,0,0.55)`,
          transition: 'box-shadow 0.55s ease',
          userSelect: 'none',
          outline: 'none',
        }}
        onClick={(e) => onChange(computeIdx(e.clientX))}
        onMouseDown={(e) => { dragging.current = true; onChange(computeIdx(e.clientX)); }}
        onTouchStart={(e) => { dragging.current = true; onChange(computeIdx(e.touches[0].clientX)); }}
        tabIndex={0}
        role="slider"
        aria-valuemin={0}
        aria-valuemax={6}
        aria-valuenow={selectedIndex}
        aria-valuetext={region.name}
        onKeyDown={(e) => {
          if (e.key === 'ArrowRight') onChange(Math.min(6, selectedIndex + 1));
          if (e.key === 'ArrowLeft') onChange(Math.max(0, selectedIndex - 1));
        }}
      >
        {/* Dividers */}
        {[1,2,3,4,5,6].map(i => (
          <div key={i} style={{
            position: 'absolute', left: `${(i/7)*100}%`,
            top: 0, bottom: 0, width: 1,
            background: 'rgba(0,0,0,0.22)',
            pointerEvents: 'none',
          }} />
        ))}

        {/* Selected region highlight */}
        <div style={{
          position: 'absolute',
          left: `${(selectedIndex / 7) * 100}%`,
          width: `${100 / 7}%`,
          top: 0, bottom: 0,
          background: 'rgba(255,255,255,0.11)',
          borderRadius: selectedIndex === 0 ? '11px 0 0 11px' : selectedIndex === 6 ? '0 11px 11px 0' : 0,
          transition: 'left 0.22s cubic-bezier(0.25,0.1,0.25,1)',
          pointerEvents: 'none',
        }} />

        {/* Ionizing boundary marker */}
        <div style={{
          position: 'absolute',
          left: '38%',
          top: -22,
          transform: 'translateX(-50%)',
          display: 'flex',
          flexDirection: 'column',
          alignItems: 'center',
          pointerEvents: 'none',
        }}>
          <span style={{ fontSize: 9, color: '#f87171', letterSpacing: '0.07em', textTransform: 'uppercase', whiteSpace: 'nowrap' }}>
            ⚡ Ionizing boundary
          </span>
          <div style={{ width: 1, height: 10, background: 'rgba(248,113,113,0.5)', marginTop: 2 }} />
        </div>

        {/* Handle */}
        <div style={{
          position: 'absolute',
          left: `${handlePct}%`,
          top: '50%',
          transform: 'translate(-50%, -50%)',
          width: 28, height: 28,
          borderRadius: '50%',
          background: `radial-gradient(circle at 38% 33%, #fff, ${region.color})`,
          boxShadow: `0 0 0 2px rgba(255,255,255,0.18), 0 0 20px ${region.glow}, 0 0 44px ${region.glow}`,
          transition: 'left 0.18s cubic-bezier(0.25,0.1,0.25,1), background 0.45s ease, box-shadow 0.45s ease',
          pointerEvents: 'none',
          zIndex: 10,
        }} />
      </div>

      {/* Region labels */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', marginTop: 8 }}>
        {SPECTRUM.map((s, i) => (
          <button
            key={s.id}
            onClick={() => onChange(i)}
            style={{
              textAlign: 'center',
              fontSize: i === selectedIndex ? 12 : 11,
              fontWeight: i === selectedIndex ? 600 : 400,
              color: i === selectedIndex ? s.color : '#32404e',
              cursor: 'pointer',
              padding: '4px 2px',
              background: 'none',
              border: 'none',
              fontFamily: 'inherit',
              transition: 'color 0.3s ease',
              letterSpacing: '0.02em',
            }}
          >
            {s.name}
          </button>
        ))}
      </div>
    </div>
  );
}

/* =========================================================
   INFO PANEL
   ========================================================= */
function InfoPanel({ region }) {
  const [show, setShow] = useState(true);
  const prevId = useRef(region.id);

  useEffect(() => {
    if (region.id !== prevId.current) {
      setShow(false);
      const t = setTimeout(() => { setShow(true); prevId.current = region.id; }, 170);
      return () => clearTimeout(t);
    }
  }, [region.id]);

  const ionizingLabel = region.ionizing === true ? 'Ionizing'
    : region.ionizing === 'partial' ? 'Partially Ionizing'
    : 'Non-Ionizing';
  const ionizingColor = region.ionizing === true ? '#f87171'
    : region.ionizing === 'partial' ? '#fbbf24'
    : '#4ade80';

  const card = {
    background: 'rgba(255,255,255,0.025)',
    border: '1px solid rgba(255,255,255,0.07)',
    borderRadius: 16,
    padding: 28,
  };

  return (
    <div
      className="info-grid"
      style={{
        display: 'grid',
        gridTemplateColumns: '1fr 1fr',
        gap: 18,
        opacity: show ? 1 : 0,
        transform: show ? 'translateY(0)' : 'translateY(7px)',
        transition: 'opacity 0.32s ease, transform 0.32s ease',
      }}
    >
      {/* LEFT — Wave + metrics */}
      <div style={{ ...card, display: 'flex', flexDirection: 'column', gap: 20 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span style={{ fontSize: 10, color: '#2e3a4e', letterSpacing: '0.09em', textTransform: 'uppercase' }}>
            Waveform Visualization
          </span>
          <span style={{
            fontSize: 9, padding: '3px 9px', borderRadius: 4,
            background: `${ionizingColor}18`,
            color: ionizingColor,
            border: `1px solid ${ionizingColor}33`,
            letterSpacing: '0.07em', textTransform: 'uppercase',
            fontWeight: 500,
          }}>
            {ionizingLabel}
          </span>
        </div>

        <div style={{
          background: 'rgba(0,0,0,0.25)',
          borderRadius: 10,
          border: '1px solid rgba(255,255,255,0.04)',
          overflow: 'hidden',
        }}>
          <WaveCanvas region={region} />
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
          <div style={{
            padding: '14px 16px',
            background: 'rgba(255,255,255,0.03)',
            borderRadius: 10,
            border: '1px solid rgba(255,255,255,0.05)',
          }}>
            <div style={{ fontSize: 9, color: '#2e3a4e', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 7 }}>
              Wavelength
            </div>
            <div style={{
              fontSize: 15, fontWeight: 700, color: region.color,
              fontFamily: 'Space Mono, monospace', lineHeight: 1.2,
            }}>
              {region.wavelength}
            </div>
            <div style={{ fontSize: 10, color: '#2e3a4e', marginTop: 5, fontFamily: 'Space Mono, monospace' }}>
              {region.wavelengthMeters}
            </div>
          </div>
          <div style={{
            padding: '14px 16px',
            background: 'rgba(255,255,255,0.03)',
            borderRadius: 10,
            border: '1px solid rgba(255,255,255,0.05)',
          }}>
            <div style={{ fontSize: 9, color: '#2e3a4e', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 7 }}>
              Frequency
            </div>
            <div style={{
              fontSize: 11, fontWeight: 600, color: '#7a869e',
              fontFamily: 'Space Mono, monospace', lineHeight: 1.4,
            }}>
              {region.frequency}
            </div>
            <div style={{ fontSize: 10, color: '#2e3a4e', marginTop: 5 }}>
              Energy: <span style={{ color: region.color }}>{region.energy}</span>
            </div>
          </div>
        </div>

        <p style={{ fontSize: 10, color: '#1e2a38', lineHeight: 1.65, fontStyle: 'italic' }}>
          Note: Waveforms are visually compressed for comparison. True wavelength differences span many orders of magnitude.
        </p>
      </div>

      {/* RIGHT — Info */}
      <div style={{ ...card, display: 'flex', flexDirection: 'column', gap: 22 }}>
        <div>
          <div style={{ fontSize: 10, color: '#2e3a4e', textTransform: 'uppercase', letterSpacing: '0.09em', marginBottom: 10 }}>
            Electromagnetic Region
          </div>
          <h2 style={{
            fontSize: 32, fontWeight: 700, letterSpacing: '-0.025em',
            color: region.color, marginBottom: 2,
            textShadow: `0 0 40px ${region.glow}`,
            transition: 'color 0.4s ease, text-shadow 0.4s ease',
          }}>
            {region.name}
          </h2>
        </div>

        <p style={{
          fontSize: 14.5, lineHeight: 1.78, color: '#7a869e',
          fontWeight: 300,
        }}>
          {region.description}
        </p>

        <div>
          <div style={{ fontSize: 10, color: '#2e3a4e', textTransform: 'uppercase', letterSpacing: '0.09em', marginBottom: 12 }}>
            Applications &amp; Examples
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 8 }}>
            {(window.EXAMPLE_ICONS && window.EXAMPLE_ICONS[region.id] || []).map(({ label, render }) => (
              <div key={label} style={{
                display: 'flex', flexDirection: 'column', alignItems: 'center',
                gap: 7, padding: '12px 6px 10px',
                background: `${region.color}0d`,
                border: `1px solid ${region.color}22`,
                borderRadius: 10,
                transition: 'background 0.3s ease, border-color 0.3s ease',
              }}>
                <div style={{ width: 40, height: 40 }}>
                  {render(region.color)}
                </div>
                <div style={{
                  fontSize: 10, color: '#5a6880', textAlign: 'center',
                  lineHeight: 1.3, letterSpacing: '0.01em',
                }}>
                  {label}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* =========================================================
   SCALE LEGEND
   ========================================================= */
function ScaleLegend() {
  const ticks = [
    { label: '10⁻¹²m', pct: 0 },
    { label: '10⁻⁹m', pct: 18 },
    { label: '10⁻⁶m', pct: 43 },
    { label: '10⁻³m', pct: 64 },
    { label: '1 m', pct: 79 },
    { label: '10³m', pct: 94 },
  ];

  return (
    <div style={{
      marginTop: 24,
      padding: '20px 24px 16px',
      background: 'rgba(255,255,255,0.015)',
      border: '1px solid rgba(255,255,255,0.05)',
      borderRadius: 12,
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
        <span style={{ fontSize: 10, color: '#2e3a4e', textTransform: 'uppercase', letterSpacing: '0.08em' }}>
          Wavelength Reference Scale
        </span>
        <div className="eq-label" style={{
          display: 'flex', alignItems: 'center', gap: 8,
          fontSize: 11.5, color: '#3a4858',
          fontFamily: 'Space Mono, monospace',
        }}>
          <span style={{ color: '#4a5c72', fontWeight: 700 }}>c = λf</span>
          <span style={{ fontSize: 10, color: '#253040' }}>— longer wavelength → lower frequency</span>
        </div>
      </div>

      <div style={{ position: 'relative', height: 36 }}>
        <div style={{
          position: 'absolute', left: 0, right: 0, top: 11,
          height: 1,
          background: 'linear-gradient(to right, #c084fc33, #7dd3fc33, #a78bfa33, #fbbf2433, #f8717133, #fb923c33, #818cf833)',
        }} />
        {ticks.map(({ label, pct }) => (
          <div key={label} style={{
            position: 'absolute', left: `${pct}%`,
            top: 0, transform: 'translateX(-50%)',
            display: 'flex', flexDirection: 'column', alignItems: 'center',
          }}>
            <div style={{ width: 1, height: 9, background: '#253040' }} />
            <div style={{
              fontSize: 10, color: '#2e3a4e',
              fontFamily: 'Space Mono, monospace',
              whiteSpace: 'nowrap', marginTop: 2,
            }}>
              {label}
            </div>
          </div>
        ))}
      </div>

      <div style={{
        display: 'flex', justifyContent: 'space-between',
        marginTop: 10, fontSize: 11, color: '#1e2a38',
      }}>
        <span>Higher frequency · More energetic · Ionizing at UV-C and above</span>
        <span>Lower frequency · Less energetic</span>
      </div>
    </div>
  );
}
